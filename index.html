<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Relação de Remessas - IPEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #003366;
            --primary-hover: #002244;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #334155;
            --border: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 22px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fff;
        }

        input:focus, select:focus {
            outline: 2px solid var(--primary);
        }

        .items-section {
            background: #f8fafc;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 20px;
        }

        .item-row {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #fff;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .action-buttons {
            display: none;
            gap: 15px;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .btn-print {
            background-color: #3b82f6;
            margin-top: 0;
            flex: 1;
        }

        .btn-print:hover {
            background-color: #2563eb;
        }

        .btn-save {
            background-color: #10b981;
            margin-top: 0;
            flex: 1;
        }

        .btn-save:hover {
            background-color: #059669;
        }

        #preview-container {
            display: none;
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
        }

        .print-page {
            background: white;
            color: black;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-size: 11px;
            line-height: 1.3;
            border: 1px solid #94a3b8;
        }

        .via-block {
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }

        .corte-linha {
            border-top: 2px dashed #cbd5e1;
            margin: 25px 0;
            text-align: center;
            position: relative;
        }
        .corte-linha span {
            position: absolute;
            top: -9px;
            background: white;
            padding: 0 10px;
            font-size: 10px;
            color: #94a3b8;
            left: 50%;
            transform: translateX(-50%);
        }

        .header-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        .header-table td {
            border: 1px solid black;
            padding: 5px;
            vertical-align: top;
        }

        .title-main {
            font-weight: bold;
            font-size: 11px;
            text-align: center;
            text-transform: uppercase;
        }

        .title-doc {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding: 5px 0;
        }

        .meta-grid {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        .meta-grid td {
            border: 1px solid black;
            padding: 6px;
            width: 50%;
            font-size: 11px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .data-table th {
            border: 1px solid black;
            background-color: #f2f2f2;
            padding: 5px;
            font-weight: bold;
            text-align: left;
            text-transform: uppercase;
        }

        .data-table td {
            border: 1px solid black;
            padding: 5px;
            height: 20px;
        }

        .footer-sign {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .footer-sign td {
            border: 1px solid black;
            padding: 8px;
            width: 50%;
        }

        .via-label {
            text-align: center;
            font-weight: bold;
            font-size: 10px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #folha-a4-impressao, #folha-a4-impressao * {
                visibility: visible;
            }
            #folha-a4-impressao {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Relação de Remessas - IPEN / CNEN</h1>
    
    <div class="form-row">
        <div class="form-group">
            <label for="numero_remessa">🔢 Número da Remessa:</label>
            <input type="text" id="numero_remessa" placeholder="Ex: 042/2026">
        </div>
        <div class="form-group">
            <label for="emissor">👤 Emitido Por:</label>
            <select id="emissor">
                <option value="Juliana">Juliana</option>
                <option value="Rafael">Rafael</option>
                <option value="Washington">Washington</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="de_setor">🏢 De (Setor de Origem):</label>
            <input type="text" id="de_setor" value="Setor de Protocolo" readonly style="background-color: #e2e8f0; font-weight: bold;">
        </div>
        <div class="form-group">
            <label for="destinatario">🏢 Para (Destinatário Final):</label>
            <input type="text" id="destinatario" placeholder="Ex: Setor de TI / Recursos Humanos">
        </div>
    </div>

    <div class="form-group">
        <label for="qtd_itens">🔢 Quantidade de Itens na Remessa:</label>
        <input type="number" id="qtd_itens" min="1" value="1" oninput="gerarCamposRemetentes()">
    </div>

    <div class="items-section">
        <h3>📝 Itens da Remessa</h3>
        <div id="container-remetentes"></div>
    </div>

    <button class="btn" onclick="gerarProtocolo()">🚀 Registrar e Estruturar Vias</button>

    <div id="preview-container">
        <label style="font-weight: bold; margin-bottom: 5px; display: block;">📄 Pré-visualização da Folha A4 (Economia de Papel):</label>
        
        <div id="grupo-botoes" class="action-buttons">
            <button class="btn btn-print" onclick="imprimirPDF()">🖨️ Imprimir Protocolo</button>
            <button class="btn btn-save" onclick="baixarPDF()">📥 Salvar em PDF</button>
        </div>
        
        <div id="folha-a4-impressao" class="print-page"></div>
    </div>
</div>

<script type="module">
    // Corrigido para uma versão estável e real do Firebase SDK (10.13.0)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAToKKu1Ccmb5yT1f86gTeC1kF3ZD0Zpig",
        authDomain: "relacaoderemessasipen.firebaseapp.com",
        projectId: "relacaoderemessasipen",
        storageBucket: "relacaoderemessasipen.firebasestorage.app",
        messagingSenderId: "882583423239",
        appId: "1:882583423239:web:ced3e75173cb0350b89da2",
        measurementId: "G-NEV79DSP64"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Inicialização segura do Analytics para evitar quebra do script em ambientes locais
    try {
        getAnalytics(app);
    } catch (e) {
        console.warn("Analytics não pôde ser carregado neste ambiente local/restrito.");
    }

    function gerarCamposRemetentes() {
        const qtd = Math.max(1, parseInt(document.getElementById('qtd_itens').value) || 1);
        const container = document.getElementById('container-remetentes');
        const blocosAtuais = container.querySelectorAll('.item-row');
        
        if (blocosAtuais.length < qtd) {
            for (let i = blocosAtuais.length + 1; i <= qtd; i++) {
                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML = `
                    <span style="font-weight: bold; min-width: 60px;">Item ${String(i).padStart(2, '0')}:</span>
                    <input type="text" class="input-remetente" data-item="${i}" placeholder="Nome do Remetente" style="flex: 2;">
                    <input type="text" class="input-volume" data-item="${i}" placeholder="Referência do Volume (Ex: Caixa 01)" style="flex: 2;">
                `;
                container.appendChild(div);
            }
        } else if (blocosAtuais.length > qtd) {
            for (let i = blocosAtuais.length; i > qtd; i--) {
                container.lastElementChild.remove();
            }
        }
    }

    async function gerarProtocolo() {
        const numeroRemessa = document.getElementById('numero_remessa').value.trim();
        const emissor = document.getElementById('emissor').value;
        const deSetor = document.getElementById('de_setor').value;
        const destinatario = document.getElementById('destinatario').value.trim();
        const qtdItens = Math.max(1, parseInt(document.getElementById('qtd_itens').value) || 1);
        
        const inputsRemetentes = document.querySelectorAll('.input-remetente');
        const inputsVolumes = document.querySelectorAll('.input-volume');

        if (!numeroRemessa || !destinatario) {
            alert('⚠️ Por favor, preencha o Número da Remessa e o Destinatário (Para)!');
            return;
        }

        let remessasArrayDados = [];
        let tabelaItensHTML = "";
        let erroValidacao = false;

        for (let i = 0; i < inputsRemetentes.length; i++) {
            const nomeRemetente = inputsRemetentes[i].value.trim();
            const refVolume = inputsVolumes[i].value.trim();
            const itemNum = String(inputsRemetentes[i].getAttribute('data-item')).padStart(2, '0');

            if (!nomeRemetente || !refVolume) {
                erroValidacao = true;
                break;
            }

            remessasArrayDados.push({
                item: parseInt(itemNum),
                remetente: nomeRemetente,
                referenciaVolume: refVolume
            });

            tabelaItensHTML += `
                <tr>
                    <td style="text-align: center; width: 10%; font-weight: bold;">${itemNum}</td>
                    <td style="width: 45%;">${nomeRemetente}</td>
                    <td style="width: 45%;">${refVolume}</td>
                </tr>
            `;
        }

        if (erroValidacao) {
            alert('⚠️ Por favor, preencha o Remetente e a Referência do Volume para todos os itens!');
            return;
        }

        const dataAtual = new Date().toLocaleDateString('pt-BR');

        const construirLayoutVia = (tituloVia) => `
            <div class="via-block">
                <table class="header-table">
                    <tr>
                        <td style="width: 75%;" class="title-main">
                            COMISSÃO NACIONAL DE ENERGIA NUCLEAR - SÃO PAULO<br>
                            INSTITUTO DE PESQUISAS ENERGÉTICAS E NUCLEARES - IPEN<br>
                            <span style="font-size: 9px; font-weight: normal;">SETOR DE PROTOCOLO - RAMAIS: 8180 E 5551</span>
                        </td>
                        <td style="width: 25%; text-align: center; font-weight: bold; border-left: 1px solid black;">
                            NÚMERO:<br><span style="font-size: 13px; color: #b91c1c;">${numeroRemessa}</span>
                        </td>
                    </tr>
                </table>

                <div class="title-doc">RELAÇÃO DE REMESSA</div>

                <table class="meta-grid">
                    <tr>
                        <td><strong>DE:</strong> ${deSetor}</td>
                        <td><strong>DATA DE EMISSÃO:</strong> ${dataAtual}</td>
                    </tr>
                    <tr>
                        <td><strong>PARA:</strong> ${destinatario}</td>
                        <td><strong>EMITIDO POR:</strong> ${emissor}</td>
                    </tr>
                </table>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="text-align: center;">Item</th>
                            <th>Remetente</th>
                            <th>Referência do Volume</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tabelaItensHTML}
                    </tbody>
                </table>

                <table class="footer-sign">
                    <tr>
                        <td><strong>RECEBIDO POR:</strong></td>
                        <td><strong>DATA:</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; / &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; / 2026</td>
                    </tr>
                </table>
                
                <div class="via-label">${tituloVia}</div>
            </div>
        `;

        const folhaAlvo = document.getElementById('folha-a4-impressao');
        folhaAlvo.innerHTML = `
            ${construirLayoutVia('1ª via - Emitente (Setor de Protocolo)')}
            <div class="corte-linha"><span>✂️ LINHA DE CORTE (DESTACAR AQUI)</span></div>
            ${construirLayoutVia('2ª via - DESTINATÁRIO')}
        `;

        document.getElementById('preview-container').style.display = 'block';

        try {
            await addDoc(collection(db, "remessas"), {
                numeroRemessa,
                emissor,
                deSetor,
                destinatario,
                qtdItens: qtdItens,
                itens: remessasArrayDados,
                dataRegistro: new Date()
            });

            alert('🚀 Dados consolidados e salvos com sucesso no Firebase!');
            document.getElementById('grupo-botoes').style.display = 'flex';

        } catch (error) {
            console.error("Erro ao salvar no Firestore: ", error);
            alert('❌ Erro de comunicação com o Firebase. Verifique as regras e conexão do banco.');
        }
    }

    function baixarPDF() {
        const elemento = document.getElementById('folha-a4-impressao');
        const numeroRemessa = document.getElementById('numero_remessa').value.trim().replace(/\//g, '-');
        
        const opcoes = {
            margin:       10,
            filename:     `relacao_remessa_${numeroRemessa}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, logging: false, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opcoes).from(elemento).save();
    }

    function imprimirPDF() {
        window.print();
    }

    // Vinculação explícita ao escopo Global (Window) obrigatória para scripts do tipo module
    window.gerarCamposRemetentes = gerarCamposRemetentes;
    window.gerarProtocolo = gerarProtocolo;
    window.baixarPDF = baixarPDF;
    window.imprimirPDF = imprimirPDF;

    // Inicialização do primeiro item
    gerarCamposRemetentes();
</script>

</body>
</html>
