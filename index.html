<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Relação de Remessas - IPEN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #003366;
            --primary-hover: #002244;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #334155;
            --border: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- MENU LATERAL (SIDEBAR) --- */
        .sidebar {
            width: 240px;
            background-color: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .sidebar h2 {
            font-size: 16px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn:hover, .menu-btn.active {
            background-color: var(--primary-hover);
            color: white;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            margin-left: 240px;
            padding: 40px;
            width: calc(100% - 240px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .app-screen {
            display: none;
            width: 100%;
        }

        .app-screen.active {
            display: block;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 22px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fff;
        }

        input:focus, select:focus {
            outline: 2px solid var(--primary);
        }

        .items-section {
            background: #f8fafc;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 20px;
        }

        .item-row {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #fff;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        /* --- BOTÕES DE AÇÃO --- */
        .action-buttons {
            display: none; 
            gap: 15px;
            margin-bottom: 15px;
            margin-top: 10px;
            width: 100%;
            max-width: 210mm;
        }

        .btn-print { background-color: #3b82f6; margin-top: 0; flex: 1; }
        .btn-print:hover { background-color: #2563eb; }
        .btn-save { background-color: #10b981; margin-top: 0; flex: 1; }
        .btn-save:hover { background-color: #059669; }

        /* --- TABELA DE HISTÓRICO --- */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .history-table th, .history-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .history-table th {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-reprint {
            background-color: #64748b;
            padding: 6px 12px;
            font-size: 12px;
            margin: 0;
            width: auto;
            text-transform: none;
        }
        .btn-reprint:hover { background-color: #475569; }

        /* --- AJUSTE DA MEIA PÁGINA (PRODUÇÃO) --- */
        #preview-container {
            display: none;
            margin-top: 30px;
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
        }

        .print-page {
            background: white;
            color: black;
            width: 210mm;   
            height: 296mm;  /* Margem de segurança de 1mm para evitar folha em branco extra */
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-size: 11px;
            line-height: 1.3;
            border: 1px solid #94a3b8;
            margin: 0 auto; 
            position: relative;
        }

        .via-block {
            width: 100%;
            height: 148mm; 
            box-sizing: border-box;
            padding: 12mm 12mm; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
        }

        .corte-linha {
            position: absolute;
            top: 148mm; 
            left: 0;
            width: 100%;
            border-top: 2px dashed #cbd5e1;
            margin: 0;
            text-align: center;
            z-index: 10;
            height: 0;
        }
        
        .corte-linha span {
            position: absolute;
            top: -9px;
            background: white;
            padding: 0 10px;
            font-size: 10px;
            color: #94a3b8;
            left: 50%;
            transform: translateX(-50%);
        }

        .header-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .header-table td { border: 1px solid black; padding: 5px; vertical-align: top; }
        .title-main { font-weight: bold; font-size: 11px; text-align: center; text-transform: uppercase; }
        .title-doc { font-size: 14px; font-weight: bold; text-align: center; letter-spacing: 1px; padding: 5px 0; }
        .meta-grid { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .meta-grid td { border: 1px solid black; padding: 6px; width: 50%; font-size: 11px; }
        .data-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .data-table th { border: 1px solid black; background-color: #f2f2f2; padding: 5px; font-weight: bold; text-align: left; text-transform: uppercase; }
        .data-table td { border: 1px solid black; padding: 5px; height: 20px; }
        .footer-sign { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .footer-sign td { border: 1px solid black; padding: 8px; width: 50%; }
        .via-label { text-align: center; font-weight: bold; font-size: 10px; margin-top: 5px; text-transform: uppercase; }

        @page {
            size: A4 portrait;
            margin: 0; 
        }
        
        @media print {
            body * { visibility: hidden; }
            #folha-a4-impressao, #folha-a4-impressao * { visibility: visible; }
            #folha-a4-impressao {
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm;
                height: 296mm;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2>IPEN / CNEN</h2>
    <button id="menu-cadastro" class="menu-btn active" onclick="alternarTela('cadastro')">📝 Cadastro</button>
    <button id="menu-historico" class="menu-btn" onclick="alternarTela('historico')">📋 Histórico</button>
</nav>

<main class="main-content">
    
    <section id="screen-cadastro" class="container app-screen active">
        <h1>📋 Relação de Remessas - Registro</h1>
        
        <div class="form-row">
            <div class="form-group">
                <label for="numero_remessa">🔢 Número da Remessa (Deixe em branco para Sequencial):</label>
                <input type="text" id="numero_remessa" placeholder="Ex: 042/2026 ou vazio para auto-gerar">
            </div>
            <div class="form-group">
                <label for="emissor">👤 Emitido Por:</label>
                <select id="emissor">
                    <option value="Juliana">Juliana</option>
                    <option value="Rafael">Rafael</option>
                    <option value="Washington">Washington</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="destinatario">🏢 Para (Destinatário Final):</label>
            <input type="text" id="destinatario" placeholder="Ex: Setor de TI / Recursos Humanos">
        </div>

        <div class="form-group">
            <label for="qtd_itens">🔢 Quantidade de Itens na Remessa:</label>
            <input type="number" id="qtd_itens" min="1" value="1" oninput="gerarCamposRemetentes()">
        </div>

        <div class="items-section">
            <h3>📝 Itens da Remessa</h3>
            <div id="container-remetentes"></div>
        </div>

        <button class="btn" onclick="gerarProtocolo()">🚀 Registrar e Estruturar Vias</button>
    </section>

    <section id="screen-historico" class="container app-screen">
        <h1>📋 Histórico de Protocolos Gerados</h1>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Nº Protocolo</th>
                    <th>Emitido Por</th>
                    <th>Destinatário</th>
                    <th>Data de Emissão</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-historico">
                </tbody>
        </table>
    </section>

    <section id="preview-container">
        <hr style="border: 1px solid var(--border); margin: 30px 0;">
        <label style="font-weight: bold; margin-bottom: 10px; display: block;">📄 Documento de Saída Prontificado:</label>
        
        <div id="grupo-botoes" class="action-buttons">
            <button class="btn btn-print" onclick="imprimirPDF()">🖨️ Imprimir Vias</button>
            <button class="btn btn-save" onclick="baixarPDF()">📥 Salvar em PDF</button>
        </div>
        
        <div id="folha-a4-impressao" class="print-page"></div>
    </section>

</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAToKKu1Ccmb5yT1f86gTeC1kF3ZD0Zpig",
        authDomain: "relacaoderemessasipen.firebaseapp.com",
        projectId: "relacaoderemessasipen",
        storageBucket: "relacaoderemessasipen.firebasestorage.app",
        messagingSenderId: "882583423239",
        appId: "1:882583423239:web:ced3e75173cb0350b89da2",
        measurementId: "G-NEV79DSP64"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function alternarTela(tela) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('preview-container').style.display = 'none';

        if(tela === 'cadastro') {
            document.getElementById('screen-cadastro').classList.add('active');
            document.getElementById('menu-cadastro').classList.add('active');
        } else if(tela === 'historico') {
            document.getElementById('screen-historico').classList.add('active');
            document.getElementById('menu-historico').classList.add('active');
            carregarHistorico();
        }
    }

    function gerarCamposRemetentes() {
        const qtd = Math.max(1, parseInt(document.getElementById('qtd_itens').value) || 1);
        const container = document.getElementById('container-remetentes');
        const blocosAtuais = container.querySelectorAll('.item-row');
        
        if (blocosAtuais.length < qtd) {
            for (let i = blocosAtuais.length + 1; i <= qtd; i++) {
                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML = `
                    <span style="font-weight: bold; min-width: 60px;">Item ${String(i).padStart(2, '0')}:</span>
                    <input type="text" class="input-remetente" data-item="${i}" placeholder="Nome do Remetente" style="flex: 2;">
                    <input type="text" class="input-volume" data-item="${i}" placeholder="Referência do Volume" style="flex: 2;">
                `;
                container.appendChild(div);
            }
        } else if (blocosAtuais.length > qtd) {
            for (let i = blocosAtuais.length; i > qtd; i--) {
                container.lastElementChild.remove();
            }
        }
    }

    async function carregarHistorico() {
        const tabela = document.getElementById('lista-historico');
        tabela.innerHTML = `<tr><td colspan="5" style="text-align:center;">Carregando histórico...</td></tr>`;
        
        try {
            const q = query(collection(db, "remessas"), orderBy("dataRegistro", "desc"));
            const querySnapshot = await getDocs(q);
            tabela.innerHTML = "";

            if (querySnapshot.empty) {
                tabela.innerHTML = `<tr><td colspan="5" style="text-align:center;">Nenhum protocolo registrado.</td></tr>`;
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const doc = docSnap.data();
                const dataFormatada = doc.dataRegistro ? new Date(doc.dataRegistro.seconds * 1000).toLocaleDateString('pt-BR') : '-';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${doc.numeroRemessa}</strong></td>
                    <td>${doc.emissor}</td>
                    <td>${doc.destinatario}</td>
                    <td>${dataFormatada}</td>
                    <td><button class="btn btn-reprint" data-id="${docSnap.id}">🖨️ Reimprimir</button></td>
                `;
                tabela.appendChild(tr);

                tr.querySelector('.btn-reprint').addEventListener('click', () => {
                    renderizarViasFolha(doc);
                });
            });
        } catch (error) {
            console.error("Erro ao ler histórico: ", error);
            tabela.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Falha ao carregar registros.</td></tr>`;
        }
    }

    function renderizarViasFolha(dados) {
        let tabelaItensHTML = "";
        dados.itens.forEach(item => {
            tabelaItensHTML += `
                <tr>
                    <td style="text-align: center; width: 10%; font-weight: bold;">${String(item.item).padStart(2, '0')}</td>
                    <td style="width: 45%;">${item.remetente}</td>
                    <td style="width: 45%;">${item.referenciaVolume}</td>
                </tr>
            `;
        });

        const dataDocumento = dados.dataDocumento || new Date().toLocaleDateString('pt-BR');

        const layoutVia = (tituloVia) => `
            <div class="via-block">
                <div>
                    <table class="header-table">
                        <tr>
                            <td style="width: 75%;" class="title-main">
                                COMISSÃO NACIONAL DE ENERGIA NUCLEAR - SÃO PAULO<br>
                                INSTITUTO DE PESQUISAS ENERGÉTICAS E NUCLEARES - IPEN<br>
                                <span style="font-size: 9px; font-weight: normal;">SETOR DE PROTOCOLO - RAMAIS: 8180 E 5551</span>
                            </td>
                            <td style="width: 25%; text-align: center; font-weight: bold; border-left: 1px solid black;">
                                NÚMERO:<br><span style="font-size: 13px; color: #b91c1c; font-family: monospace;">${dados.numeroRemessa}</span>
                            </td>
                        </tr>
                    </table>

                    <div class="title-doc">RELAÇÃO DE REMESSA</div>

                    <table class="meta-grid">
                        <tr>
                            <td><strong>DE:</strong> ${dados.deSetor}</td>
                            <td><strong>DATA DE EMISSÃO:</strong> ${dataDocumento}</td>
                        </tr>
                        <tr>
                            <td><strong>PARA:</strong> ${dados.destinatario}</td>
                            <td><strong>EMITIDO POR:</strong> ${dados.emissor}</td>
                        </tr>
                    </table>

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="text-align: center;">Item</th>
                                <th>Remetente</th>
                                <th>Referência do Volume</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tabelaItensHTML}
                        </tbody>
                    </table>
                </div>

                <div>
                    <table class="footer-sign">
                        <tr>
                            <td><strong>RECEBIDO POR:</strong></td>
                            <td><strong>DATA:</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; / &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; / 2026</td>
                        </tr>
                    </table>
                    <div class="via-label">${tituloVia}</div>
                </div>
            </div>
        `;

        const folha = document.getElementById('folha-a4-impressao');
        folha.innerHTML = `
            ${layoutVia('1ª via - Emitente (Setor de Protocolo)')}
            <div class="corte-linha"><span>✂️ LINHA DE CORTE (DESTACAR AQUI)</span></div>
            ${layoutVia('2ª via - DESTINATÁRIO')}
        `;

        document.getElementById('preview-container').style.display = 'block';
        document.getElementById('grupo-botoes').style.display = 'flex';
        
        document.getElementById('preview-container').scrollIntoView({ behavior: 'smooth' });
    }

    async function gerarProtocolo() {
        let numeroRemessa = document.getElementById('numero_remessa').value.trim();
        const emissor = document.getElementById('emissor').value;
        const deSetor = "Setor de Protocolo"; 
        const destinatario = document.getElementById('destinatario').value.trim();
        const qtdItens = Math.max(1, parseInt(document.getElementById('qtd_itens').value) || 1);
        
        const inputsRemetentes = document.querySelectorAll('.input-remetente');
        const inputsVolumes = document.querySelectorAll('.input-volume');

        if (!destinatario) {
            alert('⚠️ Por favor, preencha o campo do Destinatário (Para)!');
            return;
        }

        // Regra de Numeração Sequencial Automática (20260300 até 20269999)
        if (!numeroRemessa) {
            try {
                const qSequencial = query(
                    collection(db, "remessas"),
                    where("numeroRemessa", ">=", "20260300"),
                    where("numeroRemessa", "<=", "20269999"),
                    orderBy("numeroRemessa", "desc"),
                    limit(1)
                );
                const querySnapshot = await getDocs(qSequencial);
                let ultimoNumeroNum = 20260299;

                querySnapshot.forEach((doc) => {
                    const numConvertido = parseInt(doc.data().numeroRemessa);
                    if (!isNaN(numConvertido) && numConvertido > ultimoNumeroNum) {
                        ultimoNumeroNum = numConvertido;
                    }
                });

                numeroRemessa = String(ultimoNumeroNum + 1);
            } catch (err) {
                console.error("Erro ao computar faixa sequencial: ", err);
                numeroRemessa = "20260300";
            }
        }

        let remessasArrayDados = [];
        let erroValidacao = false;

        for (let i = 0; i < inputsRemetentes.length; i++) {
            const nomeRemetente = inputsRemetentes[i].value.trim();
            const refVolume = inputsVolumes[i].value.trim();
            const itemNum = parseInt(inputsRemetentes[i].getAttribute('data-item'));

            if (!nomeRemetente || !refVolume) {
                erroValidacao = true;
                break;
            }

            remessasArrayDados.push({
                item: itemNum,
                remetente: nomeRemetente,
                referenciaVolume: refVolume
            });
        }

        if (erroValidacao) {
            alert('⚠️ Por favor, preencha o Remetente e a Referência do Volume para todos os itens!');
            return;
        }

        const dataAtual = new Date().toLocaleDateString('pt-BR');
        const dadosRemessa = {
            numeroRemessa,
            emissor,
            deSetor,
            destinatario,
            qtdItens,
            itens: remessasArrayDados,
            dataDocumento: dataAtual,
            dataRegistro: new Date()
        };

        try {
            await addDoc(collection(db, "remessas"), dadosRemessa);
            alert(`🚀 Registro armazenado com sucesso! Protocolo atribuído: ${numeroRemessa}`);
            
            renderizarViasFolha(dadosRemessa);
            
            // Limpa o formulário para novas entradas
            document.getElementById('numero_remessa').value = "";
            document.getElementById('destinatario').value = "";
            document.getElementById('qtd_itens').value = "1";
            gerarCamposRemetentes();

        } catch (error) {
            console.error("Erro ao gravar dados no Firestore: ", error);
            alert('❌ Erro de comunicação com o banco do Firebase.');
        }
    }

    function baixarPDF() {
        const elemento = document.getElementById('folha-a4-impressao');
        const numeroRemessa = document.getElementById('numero_remessa').value.trim() || "gerado";
        const numDocSafe = numeroRemessa.replace(/\//g, '-');
        
        const opcoes = {
            margin:       0, 
            filename:     `relacao_remessa_${numDocSafe}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, logging: false, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opcoes).from(elemento).save();
    }

    function imprimirPDF() {
        window.print();
    }

    // Vinculação explícita ao escopo Global para acionamento via botões HTML
    window.alternarTela = alternarTela;
    window.gerarCamposRemetentes = gerarCamposRemetentes;
    window.gerarProtocolo = gerarProtocolo;
    window.baixarPDF = baixarPDF;
    window.imprimirPDF = imprimirPDF;

    // Inicialização padrão do primeiro item
    gerarCamposRemetentes();
</script>

</body>
</html>
